server:
  port: 8082

spring:
  application:
    name: enterprise-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:fisco_data}?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: EnterpriseHikariPool
  flyway:
    enabled: false
  cloud:
    loadbalancer:
      enabled: false

fisco:
  enabled: ${FISCO_ENABLED:true}
  group: ${FISCO_GROUP:group0}
  crypto-type: ${FISCO_CRYPTO_TYPE:0}
  config-file: ${FISCO_CONFIG_FILE:/app/sdk/config.toml}

# 加密配置
encrypt:
  aes:
    key: ${ENCRYPTION_KEY:}

# JWT配置 (供其他服务调用)
jwt:
  secret: ${JWT_SECRET:default-secret-key-for-dev-only}
  expiration: 7200000
  refresh-expiration: 604800000

# Feign配置
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 30000
        loggerLevel: BASIC
      blockchainFeignClient:
        url: http://fisco-gateway-service:8087
        connectTimeout: 10000
        readTimeout: 60000  # 区块链交易可能需要更长时间
  circuitbreaker:
    enabled: true

# Resilience4j 熔断器配置
resilience4j:
  circuitbreaker:
    instances:
      default:
        registerHealthInterval: 10s
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
  timelimiter:
    instances:
      default:
        timeoutDuration: 10s
        cancelRunningFuture: true

# 日志配置
logging:
  level:
    com.fisco.app: INFO
    org.fisco.bcos: WARN

# Actuator
server:
  port: 8084

spring:
  application:
    name: logistics-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:fisco_data}?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: LogisticsHikariPool
  flyway:
    enabled: false
  cloud:
    discovery:
      client:
        simple:
          instances:
            warehouse-service:
              - uri: http://warehouse-service:8083
            fisco-gateway-service:
              - uri: http://fisco-gateway-service:8087

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.fisco.app.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

fisco:
  enabled: ${FISCO_ENABLED:true}
  group: ${FISCO_GROUP:group0}
  crypto-type: ${FISCO_CRYPTO_TYPE:0}
  config-file: ${FISCO_CONFIG_FILE:/app/sdk/config.toml}

# 合约配置
contract:
  logistics-core: ${LOGISTICS_CORE_ADDRESS:0x69ef4c5eca7bc099c2e8a8336c97af765d60dbf1}
  logistics-ops: ${LOGISTICS_OPS_ADDRESS:0x41a1281dba209614f2ada8ecc75fd957ad179d7b}

# JWT 配置
jwt:
  secret: ${JWT_SECRET:default-secret-key-for-dev-only}
  expiration: 7200000

# Feign配置
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 30000
        loggerLevel: BASIC
      warehouse-service:
        url: http://warehouse-service:8083
      fisco-gateway-service:
        url: http://fisco-gateway-service:8087
        connectTimeout: 10000
        readTimeout: 60000  # 区块链交易可能需要更长时间
  circuitbreaker:
    enabled: true

# Resilience4j 熔断器配置
resilience4j:
  circuitbreaker:
    instances:
      default:
        registerHealthInterval: 10s
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
  timelimiter:
    instances:
      default:
        timeoutDuration: 10s
        cancelRunningFuture: true

# Actuator
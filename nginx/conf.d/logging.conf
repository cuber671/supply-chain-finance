# ============================================================
# 日志配置
# ============================================================
# 分离不同服务的访问日志，便于问题排查和流量分析
# ============================================================

# ---- JSON格式访问日志（可选）----
# 适用于日志收集系统（如ELK、Loki）
# log_format json_log escape=json '{'
#     '"time":"$time_iso8601",'
#     '"remote_addr":"$remote_addr",'
#     '"remote_user":"$remote_user",'
#     '"body_bytes_sent":"$body_bytes_sent",'
#     '"request_time":"$request_time",'
#     '"upstream_response_time":"$upstream_response_time",'
#     '"status":"$status",'
#     '"request":"$request",'
#     '"request_method":"$request_method",'
#     '"request_uri":"$request_uri",'
#     '"http_referer":"$http_referer",'
#     '"http_user_agent":"$http_user_agent",'
#     '"upstream_addr":"$upstream_addr",'
#     '"upstream_status":"$upstream_status"'
# '}';

# ---- 简化日志格式（默认）----
log_format simplified '$remote_addr - $remote_user [$time_local] '
                      '$status $body_bytes_sent "$request" '
                      'rt=$request_time uct=$upstream_connect_time '
                      'uht=$upstream_header_time urt=$upstream_response_time';

# ---- 各服务访问日志 ----
# 认证服务访问日志
access_log /var/log/nginx/access-auth.log simplified;
# 企业服务访问日志
access_log /var/log/nginx/access-enterprise.log simplified;
# 仓单服务访问日志
access_log /var/log/nginx/access-warehouse.log simplified;
# 物流服务访问日志
access_log /var/log/nginx/access-logistics.log simplified;
# 金融服务访问日志
access_log /var/log/nginx/access-finance.log simplified;
# 信用服务访问日志
access_log /var/log/nginx/access-credit.log simplified;
# 区块链服务访问日志
access_log /var/log/nginx/access-blockchain.log simplified;

# ---- 错误日志级别 ----
error_log /var/log/nginx/error.log warn;

# ---- 调试日志（临时启用）----
# 仅在排查问题时启用，完成后删除
# error_log /var/log/nginx/debug.log debug;
# log级别: debug, info, notice, warn, error, crit, alert, emerg

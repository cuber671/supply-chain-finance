# ============================================================
# 限流策略配置
# ============================================================
# 三层限流机制:
# 1. 全局限流 (api_limit) - 基于IP地址
# 2. 服务限流 (per_service_limit) - 基于服务维度
# 3. 接口限流 (endpoint_limit) - 基于特定接口
# ============================================================

# ---- 全局限流区 ----
# 共享内存: 50MB, 约50万个状态
# 速率: 200请求/秒
# 突发: 500请求
limit_req_zone $binary_remote_addr zone=global_limit:50m rate=200r/s;

# ---- 服务级限流区 ----
# 每个服务独立的限流配置
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=enterprise_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=warehouse_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=logistics_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=finance_limit:10m rate=80r/s;
limit_req_zone $binary_remote_addr zone=credit_limit:10m rate=80r/s;

# ---- 区块链服务限流区 ----
# 区块链交易为长耗时操作，限流放宽但保证公平
limit_req_zone $binary_remote_addr zone=blockchain_limit:20m rate=30r/s;

# ---- 连接数限流区 ----
# 单IP最大连接数
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ---- 地域限流区 (可选) ----
# 根据X-Forwarded-For中的省份信息限流
# 需要GeoIP模块支持
# geo $limit {
#     default 1;
#     10.0.0.0/8 0;
#     172.16.0.0/12 0;
#     192.168.0.0/16 0;
# }

# ============================================================
# 区块链服务特殊配置
# ============================================================
# 区块链交易特点:
# 1. 长耗时 - 交易确认需要数秒到数十秒
# 2. 高价值 - 不应丢失请求
# 3. 可重试 - 交易失败可重新提交
# ============================================================

# ---- 区块链服务长耗时配置 ----
# 这些配置覆盖默认的proxy超时设置

# 区块链交易代理配置
proxy_connect_timeout 60s;   # 连接超时: 60秒
proxy_send_timeout 300s;     # 发送超时: 5分钟
proxy_read_timeout 300s;     # 读取超时: 5分钟

# 区块链请求缓冲配置
# 启用缓冲以防止长耗时请求占用连接
proxy_buffering on;
proxy_buffer_size 4k;
proxy_buffers 8 32k;
proxy_busy_buffers_size 64k;

# 区块链请求体大小限制
client_max_body_size 10m;
client_body_buffer_size 1m;

# ---- 区块链操作路径匹配 ----
# 以下路径的请求使用区块链特殊配置

# 企业区块链操作
location ~ ^/api/v1/blockchain/enterprise {
    # 限流：每秒30个请求，突发100个
    limit_req zone=blockchain_limit burst=100 nodelay;

    # 长耗时超时
    proxy_connect_timeout 120s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;

    proxy_pass http://fisco_gateway_service;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
}


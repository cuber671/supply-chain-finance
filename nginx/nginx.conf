# ============================================================
# FISCO BCOS 供应链金融平台 - Nginx API 网关配置
# ============================================================
# 版本: v1.0
# 日期: 2026-03-22
# 描述: 微服务架构统一入口，路由分发 + 限流 + JWT转发
# ============================================================

# 工作进程数，默认auto会自动检测CPU核心数
worker_processes auto;

# 错误日志配置
error_log /var/log/nginx/error.log warn;

# pid文件位置
pid /var/run/nginx.pid;

# 事件模块配置
events {
    # 单个worker最大连接数
    worker_connections 1024;

    # 使用epoll多路复用（Linux）
    use epoll;

    # 允许同时接受多个网络连接
    multi_accept on;
}

# HTTP模块配置
http {
    # 引入MIME类型配置
    include /etc/nginx/mime.types;

    # 默认文件类型
    default_type application/octet-stream;

    # 日志格式定义
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream: $upstream_addr response_time: $upstream_response_time';

    # 访问日志
    access_log /var/log/nginx/access.log main;

    # ========== 基础优化配置 ==========

    # 开启高效文件传输模式
    sendfile on;

    # 减少网络报文段的数量
    tcp_nopush on;
    tcp_nodelay on;

    # 保持连接超时时间（秒）
    keepalive_timeout 65;

    # 请求体大小限制（8MB）
    client_max_body_size 8m;

    # 缓冲区大小
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;

    # Gzip压缩配置
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml application/xml+rss text/javascript;

    # ========== 限流配置 ==========

    # 存放限流状态的共享内存（10MB，4万个状态）
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    # 存放IP访问计数状态的共享内存（10MB）
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ========== 上游服务Upstream定义 ==========

    upstream auth_service {
        server auth-service:8081;
        keepalive 32;
    }

    upstream enterprise_service {
        server enterprise-service:8082;
        keepalive 32;
    }

    upstream warehouse_service {
        server warehouse-service:8083;
        keepalive 32;
    }

    upstream logistics_service {
        server logistics-service:8084;
        keepalive 32;
    }

    upstream finance_service {
        server finance-service:8085;
        keepalive 32;
    }

    upstream credit_service {
        server credit-service:8086;
        keepalive 32;
    }

    upstream fisco_gateway_service {
        server fisco-gateway-service:8087;
        keepalive 32;
    }

    # ========== HTTP服务器配置 ==========

    server {
        listen 80 default_server;
        server_name _;

        # 默认请求超时
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # 区块链长耗时请求超时（5分钟）
        proxy_read_timeout 300s;

        # 允许请求体大小（100MB，用于大文件上传场景）
        client_max_body_size 100m;

        # ========== 健康检查端点 ==========

        location /health {
            return 200 "nginx healthy\n";
            add_header Content-Type text/plain;
        }

        # ========== API路由配置 ==========

        # ---- Auth Service (认证服务) ----
        location /api/v1/auth {
            # 限流：每秒100个请求，突发200个
            limit_req zone=api_limit burst=200 nodelay;

            # 连接数限制
            limit_conn conn_limit 50;

            # 代理配置
            proxy_pass http://auth_service;
            proxy_http_version 1.1;

            # JWT Token转发
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;

            # 代理缓存配置
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # ---- Enterprise Service (企业服务) ----
        location /api/v1/enterprise {
            limit_req zone=api_limit burst=200 nodelay;
            limit_conn conn_limit 50;

            proxy_pass http://enterprise_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # ---- Warehouse Service (仓单服务) ----
        location /api/v1/warehouse {
            limit_req zone=api_limit burst=200 nodelay;
            limit_conn conn_limit 50;

            proxy_pass http://warehouse_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # ---- Logistics Service (物流服务) ----
        location /api/v1/logistics {
            limit_req zone=api_limit burst=200 nodelay;
            limit_conn conn_limit 50;

            proxy_pass http://logistics_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # ---- Finance Service (金融服务) ----
        location /api/v1/finance {
            limit_req zone=api_limit burst=200 nodelay;
            limit_conn conn_limit 50;

            proxy_pass http://finance_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # ---- Credit Service (信用服务) ----
        location /api/v1/credit {
            limit_req zone=api_limit burst=200 nodelay;
            limit_conn conn_limit 50;

            proxy_pass http://credit_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # ---- FISCO Gateway Service (区块链网关服务) ----
        # 区块链交易为长耗时操作，需要特殊超时配置
        location /api/v1/blockchain {
            # 区块链操作限流放宽：每秒20个请求，突发50个
            limit_req zone=api_limit burst=50 nodelay;
            limit_conn conn_limit 20;

            # 长耗时超时配置（5分钟）
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            proxy_pass http://fisco_gateway_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # ========== 静态资源（前端页面）==========
        # 如果有独立前端部署，在此配置

        # ========== 错误页面配置 ==========

        # 50x错误页面
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }

        # 429错误页面（限流触发）
        error_page 429 = @rate_limit_exceeded;
        location @rate_limit_exceeded {
            default_type application/json;
            return 429 '{"code":429,"msg":"请求过于频繁，请稍后重试","data":null}';
        }
    }
}
